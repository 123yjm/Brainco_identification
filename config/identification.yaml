# 无 ROS 参数辨识配置
# robot 可选: serial_arm（通过 RegressorFactory 映射）
robot: "serial_arm"
kinematic_params: "config/kinematic_params.yaml"
# algorithm: 0 表示跑完整基准；1=OLS, 2=WLS, 3=IRLS, 4=TLS, 5=EKF, 8=NLS_FRICTION
algorithm: 0
# regularization: 1 开启 Tikhonov 正则化 (默认), 0 关闭
regularization: 1
data_file: "data/revoarm_filtered_data_condnum_56.12_0618.csv"
output_file: "result/identification.yaml"
