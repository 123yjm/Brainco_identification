# ============================================================================
# 傅里叶激励轨迹优化配置
#
# 优化目标: max det(W^T W)  (D-最优准则)
# 等式约束: q(0) = q_init, qd(0) = 0, qdd(0) = 0  (t=T 约束因周期性自动满足)
# 不等式约束: 关节位置/速度/加速度不超限 (幅值求和上界，保守估计)
# 优化算法: 两阶段 — COBYLA 粗搜 (80% 预算) + SLSQP 精化 (20% 预算)
#
# 用法: ./identify --generate-trajectory [--excite-config <path>]
# ============================================================================

robot: "serial_arm"
kinematic_params: "config/kinematic_params.yaml"

# --- 傅里叶级数参数 ---   
fourier_order: 5               # 傅里叶阶数 N
sampling_time: 10.0            # 激励轨迹运行时长 (秒)，wf = 2*pi/sampling_time
sampling_frequency: 10         # 激励轨迹采样频率 
trajectory_frequency: 100      # 轨迹发布频率 (Hz)，步长 = 1/frequency = 0.01s

# --- 起始/终止关节角 (rad)，q(0) = q(T) = q_init ---
q_init: [-1.5, 0.15, 0.0, 0.0, -1.725, 0.0, 0.0]

# --- 关节位置限位 (rad) ---
q_min: [-2.5, -0.15, -2.09, -0.3, -4.0, -0.54, -1.57]
q_max: [ 0.7,  1.65,  2.09,  2.21, 0.55,  0.54,  1.57]

# --- 关节速度限位 (rad/s)，默认 100 deg/s * 0.8 = 1.396 rad/s ---
q_dot_max: [1.396, 1.396, 1.396, 1.396, 1.396, 1.396, 1.396]

# --- 关节加速度限位 (rad/s^2)，默认 300 deg/s^2 * 0.8 = 4.189 rad/s^2 ---
q_ddot_max: [4.189, 4.189, 4.189, 4.189, 4.189, 4.189, 4.189]

# --- 优化参数 ---
multi_start_count: 8             # 多起点随机初始化次数
max_iterations: 15000            # 每次运行最大目标函数评估次数
ftol_rel: 1.0e-10               # 目标函数相对收敛容差

# --- 输出 ---
output_trajectory: "result/excitation_trajectory.csv"
